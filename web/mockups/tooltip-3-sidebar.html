<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tooltip Option 3 — Sidebar Detail</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f7f5f0; color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
    }
    header {
      padding: 10px 16px; border-bottom: 1px solid #d8d5cf;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    h1 { font-size: 0.95rem; font-weight: 700; font-family: Georgia, serif; color: #1a1a2e; }
    .option-badge {
      font-size: 0.62rem; background: #e8e5e0; color: #888; padding: 2px 8px;
      border-radius: 10px; letter-spacing: 0.04em;
    }
    #track-count { margin-left: auto; font-size: 0.67rem; color: #bbb; }

    .body { display: flex; flex: 1; min-height: 0; }

    aside {
      width: 200px; flex-shrink: 0; border-right: 1px solid #d8d5cf;
      display: flex; flex-direction: column; padding: 14px 12px; gap: 16px; overflow: hidden;
    }
    .sl { font-size: 0.6rem; letter-spacing: 0.1em; color: #aaa; text-transform: uppercase; margin-bottom: 6px; }
    .mode-sw { display: flex; border: 1px solid #d0cec8; border-radius: 5px; overflow: hidden; }
    .mode-btn {
      flex: 1; padding: 5px 0; font-size: 0.7rem; cursor: pointer;
      border: none; background: transparent; color: #888; transition: all 0.12s;
    }
    .mode-btn + .mode-btn { border-left: 1px solid #d0cec8; }
    .mode-btn.active { background: #1a1a2e; color: #f7f5f0; }

    .group-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .group-list { overflow-y: auto; display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .grow {
      display: flex; align-items: center; gap: 7px; padding: 4px 6px;
      border-radius: 4px; cursor: pointer; user-select: none; transition: background 0.1s;
    }
    .grow:hover { background: rgba(0,0,0,0.04); }
    .grow.active { background: rgba(0,0,0,0.06); outline: 1.5px solid currentColor; outline-offset: -1px; }
    .gdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .gname { font-size: 0.7rem; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gcnt { margin-left: auto; font-size: 0.62rem; color: #ccc; flex-shrink: 0; }

    .filter-lbl { display: flex; justify-content: space-between; font-size: 0.67rem; color: #999; margin-bottom: 4px; }
    input[type=range] { width: 100%; accent-color: #1a1a2e; cursor: pointer; }

    /* ── Sidebar detail pane ───────────────────────── */
    #detail-pane {
      border-top: 1px solid #e0ddd8; padding-top: 13px; flex-shrink: 0;
    }
    #detail-pane .dp-hint { font-size: 0.67rem; color: #ccc; font-style: italic; }
    #detail-pane .dp-content { display: none; }
    #detail-pane.has-data .dp-hint { display: none; }
    #detail-pane.has-data .dp-content { display: block; }
    .dp-dot-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    #dp-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    #dp-title { font-size: 0.77rem; font-weight: 600; color: #1a1a2e; line-height: 1.3; }
    #dp-artist { font-size: 0.7rem; color: #555; margin-top: 2px; }
    #dp-plays {
      display: inline-block; margin-top: 7px;
      font-size: 0.63rem; color: #888;
      background: #eeebe5; padding: 2px 8px; border-radius: 10px;
    }

    .plot-wrap { flex: 1; position: relative; min-width: 0; min-height: 0; }
    #plot { width: 100%; height: 100%; }

    #loading {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #f7f5f0; font-size: 0.85rem; color: #bbb; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="loading">Loading…</div>
  <header>
    <h1>Music Taste Map</h1>
    <span class="option-badge">Option 3 · Sidebar detail</span>
    <span id="track-count"></span>
  </header>
  <div class="body">
    <aside>
      <div>
        <div class="sl">Color by</div>
        <div class="mode-sw">
          <button class="mode-btn active" data-mode="artist">Artist</button>
          <button class="mode-btn" data-mode="genre">Genre</button>
        </div>
      </div>
      <div class="group-wrap">
        <div class="sl" id="group-label">Artists</div>
        <div class="group-list" id="group-list"></div>
      </div>
      <div>
        <div class="sl">Filters</div>
        <div class="filter-lbl"><span>Min plays</span><span id="plays-val">1</span></div>
        <input type="range" id="plays-slider" min="1" value="1" />
      </div>
      <div id="detail-pane">
        <div class="sl">Now playing</div>
        <div class="dp-hint">Hover over a point</div>
        <div class="dp-content">
          <div class="dp-dot-row">
            <div id="dp-dot"></div>
            <div id="dp-title"></div>
          </div>
          <div id="dp-artist"></div>
          <div id="dp-plays"></div>
        </div>
      </div>
    </aside>
    <div class="plot-wrap">
      <div id="plot"></div>
    </div>
  </div>

  <script>
    const DATA_PATH = "../../data/processed/viz_data.json";
    const TOP_N = 50;
    const X_RANGE = [-2.2, 7.9], Y_RANGE = [1.7, 10.0];
    const OTHER_COLOR = "#b0aead";
    const GENRE_PAL = ["#2471a3","#c0392b","#27ae60","#7d3c98","#d35400","#148f77"];

    function makeArtistPalette(n) {
      return Array.from({length:n}, (_,i) => {
        const h = (i*137.508)%360, s = 55+(i%3)*8, l = 34+(i%2)*9;
        return `hsl(${h.toFixed(1)},${s}%,${l}%)`;
      });
    }

    let allRecords=[], colorMode="artist", selectedGroup=null;
    let artistColorMap={}, clusterLabels={};
    let gMin, gMax, inited=false;

    function scaleSize(s) { return 4 + ((s-gMin)/(gMax-gMin||1))*20; }

    function rankArtists(recs, n) {
      const c={};
      for (const r of recs) c[r.artist]=(c[r.artist]||0)+1;
      return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,n).map(([a])=>a);
    }

    function buildClusterLabels(recs) {
      const cc={};
      for (const r of recs) {
        if(!cc[r.artist_cluster]) cc[r.artist_cluster]={};
        cc[r.artist_cluster][r.artist]=(cc[r.artist_cluster][r.artist]||0)+1;
      }
      const labels={};
      for (const [cid,ac] of Object.entries(cc))
        labels[cid]=Object.entries(ac).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([a])=>a).join(" · ");
      return labels;
    }

    function makeTrace(recs, color, opacity, isOther) {
      return {
        type:"scatter", mode:"markers",
        x:recs.map(r=>r.x), y:recs.map(r=>r.y),
        customdata:recs.map(r=>({title:r.title, artist:r.artist, play_count:r.play_count, color:isOther?OTHER_COLOR:color})),
        hoverinfo:"none",
        marker:{ color, size:recs.map(r=>scaleSize(r.log_size)), opacity,
                 line:{width:isOther?0.5:1, color:isOther?"#ccc":"rgba(0,0,0,0.18)"} }
      };
    }

    function buildTraces(filtered) {
      const isFiltered = selectedGroup !== null;
      if (colorMode === "artist") {
        const colored={}, other=[];
        for (const r of filtered) {
          const isKnown=!!artistColorMap[r.artist], isSel=r.artist===selectedGroup;
          if (isFiltered?isSel:isKnown) (colored[r.artist]=colored[r.artist]||[]).push(r);
          else other.push(r);
        }
        const traces=[];
        if (other.length) traces.push(makeTrace(other,OTHER_COLOR,0.3,true));
        for (const [a,sub] of Object.entries(colored)) traces.push(makeTrace(sub,artistColorMap[a],0.88,false));
        return traces;
      } else {
        const cids=[...new Set(filtered.map(r=>r.artist_cluster))].sort((a,b)=>a-b);
        const traces=[];
        if (isFiltered) {
          const other=filtered.filter(r=>r.artist_cluster!==selectedGroup);
          if (other.length) traces.push(makeTrace(other,OTHER_COLOR,0.3,true));
        }
        for (const cid of cids) {
          if (isFiltered&&cid!==selectedGroup) continue;
          const sub=filtered.filter(r=>r.artist_cluster===cid);
          if (!sub.length) continue;
          traces.push(makeTrace(sub,GENRE_PAL[cid%GENRE_PAL.length],0.88,false));
        }
        return traces;
      }
    }

    function getFiltered() {
      return allRecords.filter(r=>r.play_count >= +document.getElementById("plays-slider").value);
    }

    const BASE_LAYOUT = {
      paper_bgcolor:"#f7f5f0", plot_bgcolor:"#f7f5f0",
      font:{color:"#1a1a2e",size:11},
      xaxis:{range:X_RANGE,showgrid:true,gridcolor:"#e8e5e0",zeroline:false,showticklabels:false,fixedrange:true},
      yaxis:{range:Y_RANGE,showgrid:true,gridcolor:"#e8e5e0",zeroline:false,showticklabels:false,fixedrange:true},
      hovermode:"closest", showlegend:false, margin:{t:10,r:10,b:10,l:10}
    };

    function render() {
      const filtered=getFiltered();
      const count=selectedGroup===null?filtered.length:
        colorMode==="artist"?filtered.filter(r=>r.artist===selectedGroup).length
        :filtered.filter(r=>r.artist_cluster===selectedGroup).length;
      document.getElementById("track-count").textContent=
        `${count.toLocaleString()} / ${allRecords.length.toLocaleString()} tracks`;
      if (!inited) {
        Plotly.newPlot("plot",buildTraces(filtered),BASE_LAYOUT,{responsive:true,displayModeBar:false});
        inited=true; initHover();
      } else {
        Plotly.react("plot",buildTraces(filtered),BASE_LAYOUT);
      }
    }

    function initHover() {
      const pane = document.getElementById("detail-pane");
      document.getElementById("plot").on("plotly_hover", function(data) {
        const r = data.points[0].customdata;
        document.getElementById("dp-dot").style.background = r.color;
        document.getElementById("dp-title").textContent = r.title;
        document.getElementById("dp-artist").textContent = r.artist;
        document.getElementById("dp-plays").textContent = r.play_count.toLocaleString() + " plays";
        pane.classList.add("has-data");
      });
      document.getElementById("plot").on("plotly_unhover", function() {
        pane.classList.remove("has-data");
      });
    }

    function buildSidebar() {
      const list=document.getElementById("group-list");
      list.innerHTML=""; selectedGroup=null;
      const counts={};
      if (colorMode==="artist") {
        document.getElementById("group-label").textContent="Artists";
        for (const r of allRecords) counts[r.artist]=(counts[r.artist]||0)+1;
        for (const a of rankArtists(allRecords,TOP_N)) {
          const row=makeRow(a,artistColorMap[a],counts[a]);
          row.addEventListener("click",()=>selectGroup(row,a));
          list.appendChild(row);
        }
      } else {
        document.getElementById("group-label").textContent="Genres";
        for (const r of allRecords) counts[r.artist_cluster]=(counts[r.artist_cluster]||0)+1;
        const cids=[...new Set(allRecords.map(r=>r.artist_cluster))].sort((a,b)=>a-b);
        for (const cid of cids) {
          const label=clusterLabels[cid]||`Cluster ${cid}`;
          const row=makeRow(label,GENRE_PAL[cid%GENRE_PAL.length],counts[cid]);
          row.addEventListener("click",()=>selectGroup(row,cid));
          list.appendChild(row);
        }
      }
    }

    function makeRow(name, color, count) {
      const row=document.createElement("div");
      row.className="grow";
      row.style.color=color;
      row.innerHTML=`<div class="gdot" style="background:${color}"></div>
        <span class="gname">${name}</span><span class="gcnt">${count}</span>`;
      return row;
    }

    function selectGroup(row, key) {
      if (selectedGroup===key) {
        selectedGroup=null;
        document.querySelectorAll(".grow").forEach(r=>r.classList.remove("active"));
      } else {
        selectedGroup=key;
        document.querySelectorAll(".grow").forEach(r=>r.classList.remove("active"));
        row.classList.add("active");
      }
      render();
    }

    document.querySelectorAll(".mode-btn").forEach(btn=>btn.addEventListener("click",()=>{
      if (btn.dataset.mode===colorMode) return;
      colorMode=btn.dataset.mode;
      document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      buildSidebar(); render();
    }));

    document.getElementById("plays-slider").addEventListener("input",function(){
      document.getElementById("plays-val").textContent=this.value; render();
    });

    fetch(DATA_PATH).then(r=>r.json()).then(data=>{
      allRecords=data;
      const sizes=allRecords.map(r=>r.log_size);
      gMin=Math.min(...sizes); gMax=Math.max(...sizes);
      const top=rankArtists(allRecords,TOP_N), pal=makeArtistPalette(TOP_N);
      top.forEach((a,i)=>artistColorMap[a]=pal[i]);
      clusterLabels=buildClusterLabels(allRecords);
      document.getElementById("plays-slider").max=Math.max(...allRecords.map(r=>r.play_count));
      document.getElementById("loading").style.display="none";
      buildSidebar(); render();
    }).catch(err=>{
      document.getElementById("loading").textContent="Error: "+err.message;
    });
  </script>
</body>
</html>
