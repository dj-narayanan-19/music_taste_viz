<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mockup B — Light Editorial</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f7f5f0;
      color: #1a1a2e;
      font-family: "Georgia", "Times New Roman", serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      padding: 16px 24px 12px;
      border-bottom: 2px solid #1a1a2e;
      flex-shrink: 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .header-left h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #1a1a2e;
    }

    .header-left p {
      font-size: 0.72rem;
      font-family: -apple-system, sans-serif;
      color: #888;
      margin-top: 2px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: -apple-system, sans-serif;
      font-size: 0.75rem;
      color: #666;
    }

    select {
      background: transparent;
      border: 1px solid #ccc;
      color: #333;
      padding: 4px 8px;
      border-radius: 2px;
      font-size: 0.75rem;
      font-family: -apple-system, sans-serif;
      cursor: pointer;
    }

    input[type="range"] { accent-color: #1a1a2e; cursor: pointer; width: 90px; }

    #plot { flex: 1; min-height: 0; }

    footer {
      padding: 8px 24px;
      border-top: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: -apple-system, sans-serif;
      font-size: 0.72rem;
      color: #444;
      cursor: pointer;
      user-select: none;
    }

    .legend-item.muted { opacity: 0.35; text-decoration: line-through; }

    .legend-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #track-count {
      margin-left: auto;
      font-size: 0.7rem;
      color: #999;
      font-family: -apple-system, sans-serif;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Music Taste Map</h1>
      <p>Sonic similarity · UMAP · 963 tracks</p>
    </div>
    <div class="header-right">
      <label>Artist
        <select id="artist-filter" style="margin-left:6px">
          <option value="all">All</option>
        </select>
      </label>
      <label>Min plays <span id="plays-val">1</span>
        <input type="range" id="plays-slider" min="1" value="1" style="margin-left:6px" />
      </label>
    </div>
  </header>
  <div id="plot"></div>
  <footer>
    <div id="legend-strip"></div>
    <span id="track-count"></span>
  </footer>
  <script>
    const DATA_PATH = "../../data/processed/viz_data.json";
    const TOP_N = 12;
    // Muted, slightly desaturated palette for light bg
    const PALETTE = ["#c0392b","#27ae60","#d68910","#2471a3","#8e44ad",
                     "#ca6f1e","#148f77","#b03a2e","#1e8449","#7d6608",
                     "#1a5276","#6c3483"];
    const OTHER_COLOR = "#cccccc";

    let allRecords = [], topArtists = [], artistColor = {}, muted = new Set();

    function scaleSizes(ls) {
      const mn = Math.min(...ls), mx = Math.max(...ls), r = mx - mn || 1;
      return ls.map(s => 4 + (s - mn) / r * 20);
    }

    function hover(r) {
      return `<b>${r.title}</b><br>${r.artist}<br>${r.play_count.toLocaleString()} plays`;
    }

    function buildTraces(records) {
      const groups = {};
      for (const r of records) {
        const label = artistColor[r.artist] ? r.artist : "other";
        (groups[label] = groups[label] || []).push(r);
      }
      const traces = [];
      const other = (groups["other"] || []);
      if (other.length) {
        traces.push({ type:"scatter", mode:"markers", name:"other",
          x:other.map(r=>r.x), y:other.map(r=>r.y),
          text:other.map(hover), hovertemplate:"%{text}<extra></extra>",
          showlegend:false,
          marker:{ color:OTHER_COLOR, size:scaleSizes(other.map(r=>r.log_size)),
                   opacity:0.7, line:{width:0.8, color:"#aaaaaa"} }
        });
      }
      for (const a of topArtists) {
        const s = (groups[a] || []);
        if (!s.length || muted.has(a)) continue;
        traces.push({ type:"scatter", mode:"markers", name:a,
          x:s.map(r=>r.x), y:s.map(r=>r.y),
          text:s.map(hover), hovertemplate:"%{text}<extra></extra>",
          marker:{ color:artistColor[a], size:scaleSizes(s.map(r=>r.log_size)),
                   opacity:0.85, line:{width:1.2, color:"rgba(0,0,0,0.25)"} }
        });
      }
      return traces;
    }

    function render() {
      const artistF = document.getElementById("artist-filter").value;
      const minPlays = +document.getElementById("plays-slider").value;
      const filtered = allRecords.filter(r =>
        r.play_count >= minPlays && !muted.has(r.artist) &&
        (artistF === "all" || r.artist === artistF)
      );
      document.getElementById("track-count").textContent = `${filtered.length.toLocaleString()} tracks shown`;
      Plotly.react("plot", buildTraces(filtered), {
        paper_bgcolor:"#f7f5f0", plot_bgcolor:"#f7f5f0",
        font:{color:"#1a1a2e", size:11, family:"Georgia,serif"},
        xaxis:{showgrid:true,gridcolor:"#e0ddd8",zeroline:false,showticklabels:false,linecolor:"#ccc",linewidth:1},
        yaxis:{showgrid:true,gridcolor:"#e0ddd8",zeroline:false,showticklabels:false,linecolor:"#ccc",linewidth:1},
        hovermode:"closest", showlegend:false,
        margin:{t:12,r:12,b:12,l:12},
      }, {responsive:true, displayModeBar:false});
    }

    function init() {
      const counts = {};
      for (const r of allRecords) counts[r.artist] = (counts[r.artist]||0)+1;
      topArtists = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,TOP_N).map(([a])=>a);
      topArtists.forEach((a,i) => artistColor[a] = PALETTE[i]);

      const sel = document.getElementById("artist-filter");
      [...topArtists].sort((a,b)=>a.localeCompare(b)).forEach(a => {
        const o = document.createElement("option"); o.value = a; o.textContent = a; sel.appendChild(o);
      });
      sel.addEventListener("change", render);

      const strip = document.getElementById("legend-strip");
      topArtists.forEach(a => {
        const el = document.createElement("div"); el.className = "legend-item"; el.dataset.a = a;
        el.innerHTML = `<div class="legend-dot" style="background:${artistColor[a]};border:1px solid rgba(0,0,0,0.2)"></div>${a}`;
        el.addEventListener("click", () => {
          if (muted.has(a)) muted.delete(a); else muted.add(a);
          el.classList.toggle("muted"); render();
        });
        strip.appendChild(el);
      });

      const slider = document.getElementById("plays-slider");
      slider.max = Math.ceil(Math.max(...allRecords.map(r=>r.play_count)) / 10) * 10;
      slider.addEventListener("input", function() {
        document.getElementById("plays-val").textContent = this.value; render();
      });
    }

    fetch(DATA_PATH).then(r=>r.json()).then(data => { allRecords = data; init(); render(); });
  </script>
</body>
</html>
