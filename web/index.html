<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Taste Map</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f7f5f0;
      color: #1a1a2e;
      font-family: "Georgia", "Times New Roman", serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      padding: 12px 24px 10px;
      border-bottom: 2px solid #1a1a2e;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header-title h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #1a1a2e;
      white-space: nowrap;
    }

    .header-title p {
      font-size: 0.65rem;
      font-family: -apple-system, sans-serif;
      color: #aaa;
      margin-top: 2px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    /* Mode switcher */
    .mode-switcher {
      display: flex;
      border: 1.5px solid #d0cec8;
      border-radius: 6px;
      overflow: hidden;
      font-family: -apple-system, sans-serif;
      flex-shrink: 0;
    }

    .mode-btn {
      padding: 5px 14px;
      font-size: 0.75rem;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #999;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .mode-btn + .mode-btn { border-left: 1.5px solid #d0cec8; }

    .mode-btn.active {
      background: #1a1a2e;
      color: #f7f5f0;
    }

    #track-count {
      margin-left: auto;
      font-size: 0.7rem;
      font-family: -apple-system, sans-serif;
      color: #ccc;
      white-space: nowrap;
    }

    #plot { flex: 1; min-height: 0; }

    footer {
      padding: 9px 24px 11px;
      border-top: 1px solid #e0ddd8;
      background: #f7f5f0;
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
      flex-wrap: wrap;
      min-height: 42px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-family: -apple-system, sans-serif;
      cursor: pointer;
      user-select: none;
      border: 1.5px solid transparent;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .chip:hover { background: rgba(0,0,0,0.04); }

    .chip.selected {
      border-color: currentColor;
      background: rgba(0,0,0,0.05);
    }

    .chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.15);
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f5f0;
      font-family: sans-serif;
      font-size: 0.85rem;
      color: #bbb;
      z-index: 10;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">
      <h1>Music Taste Map</h1>
      <p>Sonic similarity · UMAP</p>
    </div>
    <div class="mode-switcher">
      <button class="mode-btn active" data-mode="artist">Artist</button>
      <button class="mode-btn" data-mode="genre">Genre</button>
    </div>
    <span id="track-count"></span>
  </header>

  <div id="plot"></div>
  <footer id="chip-strip"></footer>

  <div id="loading">Loading…</div>
  <script src="app.js"></script>
</body>
</html>
