<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Taste Map</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e12;
      color: #e0e0e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid #1e1e28;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #c8c8e0;
    }

    header p {
      font-size: 0.78rem;
      color: #6868a0;
      margin-top: 2px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 20px;
      border-bottom: 1px solid #1e1e28;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label {
      font-size: 0.75rem;
      color: #8888b8;
      white-space: nowrap;
    }

    select {
      background: #1a1a24;
      border: 1px solid #2e2e44;
      color: #c8c8e0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.78rem;
      cursor: pointer;
    }

    select:focus { outline: none; border-color: #6060c0; }

    input[type="range"] {
      width: 120px;
      accent-color: #6060c0;
      cursor: pointer;
    }

    #plays-value {
      font-size: 0.75rem;
      color: #8888b8;
      min-width: 24px;
    }

    #stats {
      font-size: 0.75rem;
      color: #5050808;
      margin-left: auto;
      color: #505080;
    }

    #plot {
      flex: 1;
      min-height: 0;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e12;
      font-size: 0.9rem;
      color: #505080;
      z-index: 10;
    }

    #error {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: #0e0e12;
      font-size: 0.85rem;
      color: #a05050;
      text-align: center;
      padding: 40px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <header>
    <h1>Music Taste Map</h1>
    <p>Songs positioned by sonic similarity · size = play count · color = cluster</p>
  </header>

  <div class="controls">
    <div class="control-group">
      <label for="artist-filter">Artist</label>
      <select id="artist-filter">
        <option value="all">All artists</option>
      </select>
    </div>
    <div class="control-group">
      <label for="plays-filter">Min plays</label>
      <input type="range" id="plays-filter" min="1" max="100" value="1" step="1" />
      <span id="plays-value">1</span>
    </div>
    <span id="stats"></span>
  </div>

  <div id="plot"></div>
  <div id="loading">Loading data…</div>
  <div id="error"></div>

  <script src="app.js"></script>
</body>
</html>
