<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Taste Map</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f7f5f0; color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
    }

    header {
      padding: 10px 16px; border-bottom: 1px solid #d8d5cf;
      display: flex; align-items: baseline; gap: 10px; flex-shrink: 0;
    }
    header h1 { font-size: 0.95rem; font-weight: 700; font-family: Georgia, serif; color: #1a1a2e; }
    .subtitle { font-size: 0.62rem; color: #ccc; letter-spacing: 0.07em; text-transform: uppercase; }
    #track-count { margin-left: auto; font-size: 0.67rem; color: #ccc; }

    /* ── Layout ──────────────────────────────────────── */
    .body { display: flex; flex: 1; min-height: 0; }

    aside {
      width: 204px; flex-shrink: 0; border-right: 1px solid #d8d5cf;
      display: flex; flex-direction: column; padding: 14px 12px; gap: 18px; overflow: hidden;
    }

    .sl {
      font-size: 0.59rem; letter-spacing: 0.1em; color: #bbb;
      text-transform: uppercase; margin-bottom: 7px;
    }

    /* Color-by toggle */
    .mode-sw { display: flex; border: 1px solid #d0cec8; border-radius: 5px; overflow: hidden; }
    .mode-btn {
      flex: 1; padding: 5px 0; font-size: 0.7rem; cursor: pointer;
      border: none; background: transparent; color: #888;
      transition: all 0.12s; font-family: inherit; text-align: center;
    }
    .mode-btn + .mode-btn { border-left: 1px solid #d0cec8; }
    .mode-btn.active { background: #1a1a2e; color: #f7f5f0; }

    /* Scrollable group list */
    .group-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .group-list { overflow-y: auto; display: flex; flex-direction: column; gap: 2px; flex: 1; }

    .grow {
      display: flex; align-items: center; gap: 7px; padding: 4px 6px;
      border-radius: 4px; cursor: pointer; user-select: none; transition: background 0.1s;
    }
    .grow:hover { background: rgba(0,0,0,0.04); }
    .grow.active { background: rgba(0,0,0,0.06); outline: 1.5px solid currentColor; outline-offset: -1px; }

    .gdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .gname { font-size: 0.7rem; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gcnt { margin-left: auto; font-size: 0.61rem; color: #ccc; flex-shrink: 0; }

    /* Neighborhood rows — stacked artist names */
    .gcluster { align-items: flex-start; }
    .gcluster .gdot { margin-top: 3px; }
    .gcluster .gcnt { margin-top: 1px; }
    .gcluster-names { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .gcluster-names .gname { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gsec { font-size: 0.62rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Min-plays filter */
    .filter-lbl {
      display: flex; justify-content: space-between;
      font-size: 0.67rem; color: #aaa; margin-bottom: 4px;
    }
    input[type=range] { width: 100%; accent-color: #1a1a2e; cursor: pointer; }

    /* ── Plot area ───────────────────────────────────── */
    .plot-wrap { flex: 1; position: relative; min-width: 0; min-height: 0; }
    #plot { width: 100%; height: 100%; }

    /* ── Fixed hover panel ───────────────────────────── */
    #hover-panel {
      position: absolute; bottom: 16px; right: 16px;
      background: rgba(255,255,255,0.97);
      border: 1px solid #d8d5cf; border-radius: 8px;
      padding: 11px 14px; min-width: 168px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.09);
      pointer-events: none;
    }
    .hp-hint { font-size: 0.67rem; color: #ccc; font-style: italic; }
    .hp-content { display: none; }
    #hover-panel.has-data .hp-hint { display: none; }
    #hover-panel.has-data .hp-content { display: block; }
    .hp-dot-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    #hp-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    #hp-title { font-size: 0.8rem; font-weight: 600; color: #1a1a2e; line-height: 1.3; }
    #hp-artist { font-size: 0.72rem; color: #555; margin-top: 2px; }
    #hp-plays { font-size: 0.65rem; color: #aaa; margin-top: 4px; }

    #loading {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #f7f5f0;
      font-size: 0.85rem; color: #bbb; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="loading">Loading…</div>

  <header>
    <h1>Music Taste Map</h1>
    <span class="subtitle">Sonic similarity · UMAP</span>
    <span id="track-count"></span>
  </header>

  <div class="body">
    <aside>
      <div>
        <div class="sl">Color by</div>
        <div class="mode-sw">
          <button class="mode-btn active" data-mode="artist">Artist</button>
          <button class="mode-btn" data-mode="genre" id="genre-btn">Neighborhood</button>
        </div>
      </div>

      <div class="group-wrap">
        <div class="sl" id="group-label">Artists</div>
        <div class="group-list" id="group-list"></div>
      </div>

      <div>
        <div class="sl">Filters</div>
        <div class="filter-lbl"><span>Min plays</span><span id="plays-val">1</span></div>
        <input type="range" id="plays-slider" min="1" value="1" />
      </div>
    </aside>

    <div class="plot-wrap">
      <div id="plot"></div>
      <div id="hover-panel">
        <div class="hp-hint">Hover over a point</div>
        <div class="hp-content">
          <div class="hp-dot-row">
            <div id="hp-dot"></div>
            <div id="hp-title"></div>
          </div>
          <div id="hp-artist"></div>
          <div id="hp-plays"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
